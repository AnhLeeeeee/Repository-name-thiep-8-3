<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Chúc mừng 8/3</title>

<style>
body {
    margin: 0;
    /* Đổi sang màu tím đen để làm nổi bật màu hồng */
    background: #1a000a; 
    font-family: 'Segoe UI', Arial, sans-serif;
    overflow: hidden;
}

/* canvas nền */
#matrix, #particles {
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
}

#matrix { z-index: 1; }
#particles { z-index: 2; pointer-events: none; }

#startHeart {
    display: block;
    margin: 120px auto 0 auto;
    cursor: pointer;
    position: relative;
    z-index: 5;
    /* Thêm hiệu ứng phát sáng cho trái tim bắt đầu */
    filter: drop-shadow(0 0 15px #ff4d8d);
}

.btn {
    position: fixed;
    bottom: 120px;
    left: 50%;
    transform: translateX(-50%);
    padding: 14px 32px;
    font-size: 18px;
    font-weight: bold;
    border-radius: 40px;
    /* Viền hồng sáng */
    border: 2px solid #ff85a2; 
    background: rgba(255, 77, 141, 0.2);
    color: #ffe0e9;
    backdrop-filter: blur(10px);
    cursor: pointer;
    z-index: 6;
    transition: all 0.3s;
    text-shadow: 0 0 5px rgba(255,255,255,0.5);
}

.btn:hover {
    background: rgba(255, 77, 141, 0.5);
    box-shadow: 0 0 20px #ff4d8d;
}

#next { display: none; }
#replay { display: none; }

.heart {
    position: absolute;
    color: #ffb3c1; /* Hồng pastel nhẹ */
    font-size: 26px;
    /* Hiệu ứng tỏa sáng cực mạnh cho tim bay */
    text-shadow: 0 0 10px #ff4d8d, 0 0 20px #ff75a0;
    animation: float 4s linear infinite;
}

@keyframes float {
    0% { transform: translateY(0) scale(1) rotate(0deg); opacity: 1; }
    100% { transform: translateY(-900px) scale(1.8) rotate(360deg); opacity: 0; }
}
</style>
</head>

<body>

<canvas id="matrix"></canvas>
<canvas id="particles"></canvas>
<canvas id="startHeart" width="500" height="400"></canvas>

<div id="next" class="btn">💖 Xem tiếp</div>
<div id="replay" class="btn">🔄 Xem lại</div>

<script>
function resizeCanvas(canvas) {
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;
}

/* MATRIX - Đổi sang màu hồng Neon */
const canvas = document.getElementById("matrix");
const ctx = canvas.getContext("2d");
resizeCanvas(canvas);

const letters = ["8", "/", "3", "🌸", "💕", "🎀"];
const fontSize = 16;
let columns = Math.floor(canvas.width / fontSize);
let drops = [];
for (let i = 0; i < columns; i++) drops[i] = 1;

function drawMatrix() {
    ctx.fillStyle = "rgba(26, 0, 10, 0.1)"; // Làm mờ chậm hơn để tạo đuôi
    ctx.fillRect(0, 0, canvas.width, canvas.height);

    // Màu chữ hồng sáng (Hot Pink)
    ctx.fillStyle = "#ff4d8d"; 
    ctx.font = fontSize + "px monospace";

    for (let i = 0; i < drops.length; i++) {
        let text = letters[Math.floor(Math.random() * letters.length)];
        ctx.fillText(text, i * fontSize, drops[i] * fontSize);
        if (drops[i] * fontSize > canvas.height && Math.random() > 0.975) drops[i] = 0;
        drops[i] += 1.2;
    }
}
function matrixLoop(){
    drawMatrix();
    requestAnimationFrame(matrixLoop);
}
matrixLoop();
/* PARTICLES - Đổi sang màu hồng phấn và hồng trắng */
const pCanvas = document.getElementById("particles");
const pCtx = pCanvas.getContext("2d");
resizeCanvas(pCanvas);

window.addEventListener("resize", () => {
    resizeCanvas(canvas);
    resizeCanvas(pCanvas);
});

let particles = [];
class Particle {
    constructor(x, y) {
        this.x = Math.random() * pCanvas.width;
        this.y = Math.random() * pCanvas.height;
        this.tx = x;
        this.ty = y;
        this.size = Math.random() * 2 + 1;
    }
    update() {
        this.x += (this.tx - this.x) * 0.1;
        this.y += (this.ty - this.y) * 0.1;
    }
    draw() {
        pCtx.fillStyle = "#ffb3c1"; // Hồng nhạt
        pCtx.shadowColor = "#ff0a54"; // Hồng đậm tỏa sáng
        pCtx.shadowBlur = 3;
        pCtx.beginPath();
        pCtx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
        pCtx.fill();
        pCtx.shadowBlur = 0;
    }
}

function createText(message) {
    particles = [];
    let off = document.createElement("canvas");
    let offCtx = off.getContext("2d");
    off.width = pCanvas.width;
    off.height = pCanvas.height;
    let textSize = Math.max(60, window.innerWidth / 10);
    offCtx.fillStyle = "white";
    offCtx.textAlign = "center";
    offCtx.textBaseline = "middle";
    offCtx.font = "bold " + textSize + "px Arial";
    let lines = message.split("\n");
    let lineHeight = textSize * 1.3;
    for (let i = 0; i < lines.length; i++) {
        offCtx.fillText(lines[i], off.width / 2, off.height / 2 + (i - (lines.length - 1) / 2) * lineHeight);
    }
    let data = offCtx.getImageData(0, 0, off.width, off.height).data;
    for (let y = 0; y < off.height; y += 6) {
        for (let x = 0; x < off.width; x += 6) {
            let index = (y * off.width + x) * 4;
            if (data[index + 3] > 128) particles.push(new Particle(x, y));
        }
    }
}

function animateParticles() {
    pCtx.clearRect(0, 0, pCanvas.width, pCanvas.height);
    particles.forEach(p => { p.update(); p.draw(); });
    requestAnimationFrame(animateParticles);
}
animateParticles();

/* HEARTS */
function floatingHearts() {
    setInterval(() => {
        let heart = document.createElement("div");
        heart.className = "heart";
        // Luân phiên giữa các icon khác nhau
        const icons = ["❤️", "💖", "🌸", "🌹", "✨"];
        heart.innerHTML = icons[Math.floor(Math.random() * icons.length)];
        heart.style.left = Math.random() * window.innerWidth + "px";
        heart.style.top = window.innerHeight + "px";
        document.body.appendChild(heart);
        setTimeout(() => heart.remove(), 6000);
    }, 300);
}

/* LOGIC TEXT */
const messages = [
    "Chúc\nngười đẹp",
    "Có một ngày\n8/3 thật nhiều\nniềm vui",
    "Luôn\nxinh đẹp,\nhạnh phúc",
    "Và gặp\nthật nhiều\nmay mắn",
    "Trong\ncuộc sống\nnhaaa ❤️"
];
let index = 0;
function showMessage() {
    createText(messages[index]);
    document.getElementById("next").style.display = "block";
}
document.getElementById("next").onclick = () => {
    try { document.getElementById("music").play(); } catch(e) {}
    index++;
    if (index < messages.length) {
        showMessage();
    } else {
        document.getElementById("next").style.display = "none";
        floatingHearts();
        document.getElementById("replay").style.display = "block";
    }
}
document.getElementById("replay").onclick = () => {
    particles = [];
    index = 0;
    document.getElementById("replay").style.display = "none";
    showMessage();
}

/* HEART CANVAS */
const heartCanvas = document.getElementById("startHeart");
const hctx = heartCanvas.getContext("2d");
let heartParticles = [];
function createHeart() {
    let centerX = 250;
    let centerY = 200;
    let scale = 12;
    for (let t = 0; t < Math.PI * 2; t += 0.03) {
        let x = 16 * Math.pow(Math.sin(t), 3);
        let y = 13 * Math.cos(t) - 5 * Math.cos(2 * t) - 2 * Math.cos(3 * t) - Math.cos(4 * t);
        let px = centerX + x * scale;
        let py = centerY - y * scale;
        heartParticles.push({
            x: Math.random() * 500,
            y: Math.random() * 400,
            tx: px,
            ty: py
        });
    }
}

function animateHeart() {
    hctx.clearRect(0, 0, 500, 400);
    heartParticles.forEach(p => {
        p.x += (p.tx - p.x) * 0.02;
        p.y += (p.ty - p.y) * 0.02;
        // Màu chữ "LOVE YOU" hồng đậm rực rỡ
        hctx.fillStyle = "#ff0a54"; 
        hctx.font = "bold 10px Arial";
        hctx.fillText("LOVE", p.x, p.y);
    });
    requestAnimationFrame(animateHeart);
}

createHeart();
animateHeart();

heartCanvas.onclick = () => {
    heartCanvas.style.display = "none";
    try { document.getElementById("music").play(); } catch(e) {}
    showMessage();
}
document.getElementById("next").style.display="block";
</script>

<audio id="music" loop>
<source src="https://files.catbox.moe/xlqzvg.mp3">
</audio>

</body>
</html>
